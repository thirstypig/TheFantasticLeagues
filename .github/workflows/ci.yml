name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # Install all dependencies
      - run: npm ci
      - run: cd server && npm ci
      - run: cd client && npm ci

      # TypeScript checks
      - name: TypeScript (client)
        run: cd client && npx tsc --noEmit
      - name: TypeScript (server)
        run: cd server && npx tsc --noEmit

      # Tests
      - name: Server tests
        run: npm run test:server
      - name: Client tests
        run: npm run test:client

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: cd server && npm ci
      - run: cd client && npm ci

      # Block on critical vulnerabilities
      - name: Audit root
        run: npm audit --audit-level=critical
      - name: Audit server
        run: cd server && npm audit --audit-level=critical
      - name: Audit client
        run: cd client && npm audit --audit-level=critical

  # Deploys are handled by Railway's GitHub integration:
  # every push to main triggers a Railway build automatically.
  # No CI deploy step is needed (Railway has no inbound deploy
  # webhook URL — its "Webhooks" feature is outbound-only).
