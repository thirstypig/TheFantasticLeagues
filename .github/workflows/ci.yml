name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # Install all dependencies
      - run: npm ci
      - run: cd server && npm ci
      - run: cd client && npm ci
      - run: cd mcp-servers/fbst-app && npm ci
      - run: cd mcp-servers/mlb-data && npm ci

      # TypeScript checks
      - name: TypeScript (client)
        run: cd client && npx tsc --noEmit
      - name: TypeScript (server)
        run: cd server && npx tsc --noEmit

      # Tests
      - name: Server tests
        run: npm run test:server
      - name: Client tests
        run: npm run test:client
      - name: MCP fbst-app tests
        run: cd mcp-servers/fbst-app && npm test
      - name: MCP mlb-data tests
        run: cd mcp-servers/mlb-data && npm test

  # DB-integration tests need a real Postgres. Kept in a SEPARATE job (its own
  # DATABASE_URL) so the main `test` job stays DB-less and unaffected. Only the
  # destructive draft suite — gated by ALLOW_DESTRUCTIVE_DB_TESTS + a localhost
  # host (see server/src/test-support/dbSafety.ts) — runs here, against an
  # ephemeral container that is fine to wipe.
  db-integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: fbst_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/fbst_test
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/fbst_test
      ALLOW_DESTRUCTIVE_DB_TESTS: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: cd server && npm ci # postinstall runs `prisma generate`

      # `db push` syncs schema.prisma directly — no migration SQL runs, so the
      # ephemeral DB can't hit P3009 and doesn't depend on migration history.
      - name: Sync schema to test DB
        run: cd server && npx prisma db push --schema ../prisma/schema.prisma --skip-generate --accept-data-loss

      - name: DB integration tests (real Postgres)
        run: cd server && npx vitest run src/features/draft/__tests__/draftIntegration.test.ts src/features/transactions/services/__tests__/ilFeeService.integration.test.ts

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: cd server && npm ci
      - run: cd client && npm ci

      # Block on critical vulnerabilities
      - name: Audit root
        run: npm audit --audit-level=critical
      - name: Audit server
        run: cd server && npm audit --audit-level=critical
      - name: Audit client
        run: cd client && npm audit --audit-level=critical

      # Block CONCURRENTLY in Prisma migrations — Prisma wraps each migration
      # in a transaction; CONCURRENTLY aborts with PG 25001 and leaves the
      # migration failed-in-flight (P3009), freezing all future deploys.
      # See docs/solutions/deployment/railway-prisma-concurrent-index-p3009-block.md
      - name: Block CONCURRENTLY in Prisma migrations
        run: |
          violations=$(find prisma/migrations -name '*.sql' -print0 | xargs -0 awk '
            { line = $0; sub(/--.*/, "", line); if (tolower(line) ~ /concurrently/) print FILENAME":"FNR": "$0 }
          ')
          if [ -n "$violations" ]; then
            echo "$violations"
            echo "::error::CONCURRENTLY found in Prisma migration SQL. Prisma wraps each migration in a transaction; CONCURRENTLY aborts (PG 25001) and leaves the migration failed-in-flight (P3009), freezing all future deploys. Use the two-step out-of-band pattern instead — see docs/solutions/deployment/railway-prisma-concurrent-index-p3009-block.md"
            exit 1
          fi

  # Deploys are handled by Railway's GitHub integration:
  # every push to main triggers a Railway build automatically.
  # No CI deploy step is needed (Railway has no inbound deploy
  # webhook URL — its "Webhooks" feature is outbound-only).
